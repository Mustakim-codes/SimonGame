<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Says Game</title>

    <style>
        body {
            text-align: center;
            font-family: Arial;
        }

        .btn {
            height: 200px;
            width: 200px;
            border-radius: 20%;
            border: 10px solid black;
            margin: 1.5rem;
            font-size: 2rem;
            color: white;
        }

        .btn-container {
            display: flex;
            justify-content: center;
        }

        .yellow {
             background-color: yellow; color: black; 
            }
        .red { 
            background-color: red; 
        }
        .purple { 
            background-color: purple; 
        }
        .green { 
            background-color: green; 
        }

        .flash {
            background-color: white !important;
        }

        .userflash {
            background-color: green !important;
        }
    </style>
</head>

<body>

    <h1>Simon Says Game</h1>
    <h2 id="msg">Press any key, click, or tap to start</h2>

    <div class="btn-container">
        <div>
            <div class="btn red"> 1</div>
            <div class="btn yellow">2</div>
        </div>
        <div>
            <div class="btn green">3</div>
            <div class="btn purple">4</div>
        </div>
    </div>

<script>
    let gameSeq = [];
    let userSeq = [];

    let btns = ["yellow", "red", "purple", "green"];

    let started = false;
    let level = 0;

    let h2 = document.querySelector("#msg");
    function startGame(e) {
        
        if (e && e.target.classList.contains("btn")) return;

        if (!started) {
            reset();
            started = true;
            levelUp();
        }
    }

    
    document.addEventListener("keypress", startGame);
    document.addEventListener("click", startGame);
    document.addEventListener("touchstart", startGame);

    function gameFlash(btn) {
        btn.classList.add("flash");
        setTimeout(() => btn.classList.remove("flash"), 250);
    }

   
    function userFlash(btn) {
        btn.classList.add("userflash");
        setTimeout(() => btn.classList.remove("userflash"), 250);
    }

    function levelUp() {
        userSeq = [];
        level++;

        h2.innerText = "Level " + level;

        let randIdx = Math.floor(Math.random() * 4);
        let randColor = btns[randIdx];
        let randBtn = document.querySelector("." + randColor);

        gameSeq.push(randColor);

        gameFlash(randBtn);
    }

    function checkAns(idx) { 
        if (userSeq[idx] === gameSeq[idx]) {
            if (userSeq.length == gameSeq.length) {
                setTimeout(levelUp, 1000);
            }
        } else {
            let score = level - 1;

            h2.innerHTML = `
                Game Over! Your score was <b>${score}</b><br>
                Press any key, click, or tap to restart
            `;

            document.body.style.backgroundColor = "red";

            setTimeout(() => {
                document.body.style.backgroundColor = "white";
            }, 150);

            started = false;
        }
    }

    function btnPress() {
        if (!started) return;

        let btn = this;

        userFlash(btn);

        let userColor = btn.classList[1];
        userSeq.push(userColor);

        checkAns(userSeq.length - 1);
    }

    let allBtns = document.querySelectorAll(".btn");

    for (let btn of allBtns) {
        btn.addEventListener("click", btnPress);
    }

    function reset() {
        gameSeq = [];
        userSeq = [];
        level = 0;
    }
</script>

</body>
</html>
